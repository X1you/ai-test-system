# docker-compose.yml — PostgreSQL 开发/测试环境
#
# 启动：  docker compose up -d
# 停止：  docker compose down
# 清空：  docker compose down -v  （删除数据卷）
#
# 连接字符串：
#   postgresql+psycopg://aitest:aitest@localhost:5432/aitest
#
# 切换步骤：
#   1. 安装驱动：pip install -e ".[postgresql]"
#   2. 设环境变量：export DATABASE_URL="postgresql+psycopg://aitest:aitest@localhost:5432/aitest"
#   3. 运行迁移：alembic upgrade head
#   4. 启动应用：正常启动，自动连接 PostgreSQL

services:
  postgres:
    image: postgres:16-alpine
    container_name: aitest-postgres
    environment:
      POSTGRES_USER: aitest
      POSTGRES_PASSWORD: aitest
      POSTGRES_DB: aitest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitest"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    driver: local
