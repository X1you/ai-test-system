# AI 测试用例生成系统 — 配置文件

llm:
  provider: deepseek
  api_key: ${LLM_API_KEY}
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  temperature: 0.3
  max_tokens: 8192
  timeout: 120
  retry: 2

knowledge_base:
  enabled: true
  vault_path: ~/Documents/test-interview-kb

pipeline:
  default_mode: semi
  default_dimensions: basic
  default_formats: excel
  self_check: true
  max_concurrent: 2

output:
  dir: ./output
