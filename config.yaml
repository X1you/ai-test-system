# AI 测试用例生成系统 — 配置文件

llm:
  provider: custom
  api_key: ${LLM_API_KEY}
  base_url: https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
  model: qwen3.8-max-preview
  temperature: 0.3
  max_tokens: 8192
  timeout: 120
  retry: 2

# 注：知识库配置已迁移到 DB（通过知识库页面管理），不再使用 config.yaml
pipeline:
  default_mode: semi
  default_dimensions: basic
  default_formats: excel
  self_check: true
  max_concurrent: 2

output:
  dir: ./output
