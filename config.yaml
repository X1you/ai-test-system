llm:
  providers:
  - provider: bigmodel
    api_key: ${LLM_API_KEY}
    base_url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    model: glm-4.7-flash
    temperature: 0.3
    max_tokens: 8192
    timeout: 120
    retry: 2
    name: bigmodel
    protocol: openai_compatible
    enabled: true
    priority: 0
    tags: []
  - provider: deepseek-fake
    name: deepseek-fake
    protocol: openai_compatible
    api_key: sk-fake-1234567890abcdef-1234567890abcdef-12345
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat
    temperature: 0.3
    max_tokens: 4096
    timeout: 60
    retry: 2
    enabled: true
    priority: 1
    tags: []
  default: bigmodel
pipeline:
  default_mode: semi
  default_dimensions: basic
  default_formats: excel
  self_check: true
  max_concurrent: 2
output:
  dir: /Users/x1you/Documents/ai-test-system/output
integrations:
  enabled: false
