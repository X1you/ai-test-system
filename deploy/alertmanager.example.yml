# AlertManager 配置模板 — ai-test-system
#
# 复制为 alertmanager.yml 并填入真实通知渠道（钉钉 webhook / 邮件）。
# 钉钉告警推荐用 dingtalk-webhook 适配器（如 timonwong/prometheus-webhook-dingtalk）。
#
# 部署：见 docs/ALERTING.md

global:
  resolve_timeout: 5m

# ─── 告警路由 ───
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s        # 首次告警等待 10s 聚合同组
  group_interval: 30s    # 同组后续告警间隔
  repeat_interval: 1h    # 未恢复告警每小时重复通知
  receiver: 'default'
  routes:
    - matchers: ['severity="critical"']
      receiver: 'dingtalk-critical'
    - matchers: ['severity="warning"']
      receiver: 'dingtalk-warning'

# ─── 通知接收器 ───
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:8060/dingtalk/ai-test-system/send'
        send_resolved: true

  - name: 'dingtalk-critical'
    webhook_configs:
      # timonwong/prometheus-webhook-dingtalk 启动后的地址
      # 级别标识放在 URL path 里，钉钉机器人可配不同铃声
      - url: 'http://localhost:8060/dingtalk/critical/send'
        send_resolved: true

  - name: 'dingtalk-warning'
    webhook_configs:
      - url: 'http://localhost:8060/dingtalk/warning/send'
        send_resolved: true

  # 如果不用钉钉，用邮件：
  # - name: 'email'
  #   email_configs:
  #     - to: 'oncall@example.com'
  #       from: 'alertmanager@example.com'
  #       smarthost: 'smtp.example.com:587'
  #       auth_username: 'alertmanager@example.com'
  #       auth_password: 'YOUR_PASSWORD'
