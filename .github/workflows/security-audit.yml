name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # 每周一 06:00 UTC
  push:
    paths:
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'pyproject.toml'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit>=2.7
      - name: Run security audit
        run: pip-audit --strict
