name: Test

# CI 测试流水线 — 质量门禁
# 触发：push 到 main / 任意 PR
# 覆盖率门槛：50%（当前基线 64%，留有下降缓冲）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: |
          uv sync --frozen --extra web --extra db --extra excel --extra production --extra dev

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=core --cov=web \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50 \
            --cov-branch \
            -q --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
