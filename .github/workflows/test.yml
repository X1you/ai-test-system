name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'web/**'
      - 'db/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'web/**'
      - 'db/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        # 安装运行时 + 测试所需的全部可选依赖组（与本地 uv sync 一致）
        run: uv sync --frozen --extra web --extra db --extra excel --extra xmind --extra production --extra dev

      - name: Run tests with coverage
        # --cov-fail-under=50: 覆盖率低于 50% 流水线 fail（基线拦截）
        # pytest 任何用例失败也会以非零退出码 fail 整条流水线
        run: uv run pytest --cov=core --cov=web --cov-report=term --cov-report=xml --cov-fail-under=50

      - name: Upload coverage report
        if: always()  # 即使测试失败也上传，便于排查
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
