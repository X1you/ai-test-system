name: Test

# CI 测试流水线 — 质量门禁
# 触发：push 到 main / 任意 PR
# 覆盖率门槛：65%（当前基线 66%，留有下降缓冲；目标 75%，逐步提升）
#
# Jobs:
#   backend-test — 后端单元 + e2e 测试（pytest + pytest-cov）
#   frontend-e2e — 前端 Playwright e2e（chromium + mobile-chromium）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 测试环境强制开启 JWT 校验，否则 verify_token 短路放行，
      # 所有 401 断言失效（见 tests/conftest.py）
      AUTH_ENABLED: "true"
      JWT_SECRET: "ci-test-secret-at-least-32-chars-long"
      WEBHOOK_SECRET: "ci-webhook-secret"
      LLM_API_KEY: "sk-ci-dummy-key"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: |
          uv sync --frozen --extra web --extra db --extra excel --extra production --extra dev

      - name: Run unit tests with coverage
        run: |
          uv run pytest \
            tests/ \
            --ignore=tests/ai_agent_suite \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            --cov=core --cov=web --cov=db \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=65 \
            --cov-branch \
            -q --tb=short

      - name: Run e2e tests (auth/config/health/usage 全链路)
        run: |
          uv run pytest tests/e2e/ -q --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7

  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: webui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend (type-check + production build)
        run: npm run build

      - name: Run Playwright e2e tests
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webui/playwright-report/
          retention-days: 7

      - name: Upload test artifacts (screenshots/videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: webui/test-results/
          retention-days: 3
