# AI 测试用例生成系统 — PostgreSQL 生产环境 Compose Override
#
# 用法：
#   docker-compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# 此文件覆盖默认 SQLite 配置，启用 PostgreSQL 作为数据库后端。
# 适用于多实例部署 / 高并发场景。

version: "3.9"

services:
  # ─── PostgreSQL 数据库 ───
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aitest}
      POSTGRES_USER: ${POSTGRES_USER:-aitest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aitest_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aitest} -d ${POSTGRES_DB:-aitest}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── 应用（覆盖 DATABASE_URL 指向 PostgreSQL）───
  app:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 覆盖 SQLite，使用 PostgreSQL 连接串
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aitest}:${POSTGRES_PASSWORD:-aitest_secret}@postgres:5432/${POSTGRES_DB:-aitest}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - AI_TEST_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

volumes:
  pgdata:
    driver: local
