{% extends "base.html" %}
{% block nav_pipelines_active %}class="active"{% endblock %}
{% block content %}

<div class="page-header">
    <h2>Pipeline 任务</h2>
    <div class="flex items-center gap-md">
        <span class="text-sm text-muted" id="refresh-time"></span>
        <button class="btn btn-secondary btn-sm" id="refresh-btn" onclick="loadPipelines()" aria-label="刷新列表">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v6h6M20 20v-6h-6"/><path d="M20 9A9 9 0 005.6 5.6L4 7M4 15a9 9 0 0014.4 3.4L20 17"/></svg>
            刷新
        </button>
    </div>
</div>

<!-- 统计仪表盘 -->
<div class="pipeline-stats" id="pipeline-stats">
    <div class="pipeline-stat">
        <div class="stat-icon stat-icon-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </div>
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-text">总任务</div>
    </div>
    <div class="pipeline-stat">
        <div class="stat-icon stat-icon-violet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="stat-num" id="stat-running">0</div>
        <div class="stat-text">运行中</div>
    </div>
    <div class="pipeline-stat">
        <div class="stat-icon stat-icon-green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
        </div>
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-text">已完成</div>
    </div>
    <div class="pipeline-stat">
        <div class="stat-icon stat-icon-amber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>
        </div>
        <div class="stat-num" id="stat-other">0</div>
        <div class="stat-text">等待/异常</div>
    </div>
</div>

<!-- 工具栏：搜索 + 状态过滤 -->
<div class="pipeline-toolbar">
    <div class="toolbar-search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="搜索 ID 或文件名…" autocomplete="off" value="{{ keyword }}">
    </div>
    <select id="status-filter" onchange="onFilterChange()">
        <option value="">全部状态</option>
        <option value="running">运行中</option>
        <option value="pending">等待中</option>
        <option value="done">已完成</option>
        <option value="paused">已暂停</option>
        <option value="error">错误</option>
        <option value="cancelled">已取消</option>
    </select>
    <span class="toolbar-spacer"></span>
    <a href="/" class="btn btn-primary btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        启动新 Pipeline
    </a>
</div>

<!-- Pipeline 列表 -->
<div id="pipeline-list-container">
    <div style="text-align:center; padding:40px 0;">
        <div class="spinner spinner-lg"></div>
        <p class="text-muted mt-md">加载中...</p>
    </div>
</div>

<!-- 分页器 -->
<div id="pagination-container" class="pagination" style="display:none;"></div>

<script>
// ─── 状态 ───
var _currentPage = 1;
var _pageSize = 20;
var _keyword = "";
var _statusFilter = "";
var _searchTimer = null;

// 从 URL 读取初始参数
(function initFromURL() {
    var params = new URLSearchParams(window.location.search);
    _currentPage = parseInt(params.get("page")) || 1;
    _keyword = params.get("keyword") || "";
    _statusFilter = params.get("status") || "";
    var si = document.getElementById("search-input");
    if (si) si.value = _keyword;
    var sf = document.getElementById("status-filter");
    if (sf) sf.value = _statusFilter;
})();

// ─── 搜索框 debounce ───
document.getElementById("search-input").addEventListener("input", function(e) {
    if (_searchTimer) clearTimeout(_searchTimer);
    _searchTimer = setTimeout(function() {
        _keyword = (e.target.value || "").trim();
        _currentPage = 1;
        loadPipelines();
    }, 300);
});

function onFilterChange() {
    _statusFilter = document.getElementById("status-filter").value;
    _currentPage = 1;
    loadPipelines();
}

// ─── 手动刷新按钮 ───
function loadPipelines() {
    var btn = document.getElementById("refresh-btn");
    if (btn) {
        btn.disabled = true;
        btn.style.opacity = "0.6";
    }
    var url = "/api/pipeline/list?page=" + encodeURIComponent(_currentPage)
            + "&page_size=" + encodeURIComponent(_pageSize)
            + "&keyword=" + encodeURIComponent(_keyword)
            + "&status=" + encodeURIComponent(_statusFilter);

    authFetch(url, { headers: { "Accept": "application/json" } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            renderPipelines(data);
            renderPagination(data);
            updateURL();
        })
        .catch(function(err) {
            document.getElementById("pipeline-list-container").innerHTML =
                '<div class="card" style="background:var(--danger-light); border-color:var(--danger);">'
                + '<strong>加载失败</strong>'
                + '<p class="text-sm text-muted mt-sm">' + escapeHtml(err.message) + '</p>'
                + '<button class="btn btn-secondary btn-sm mt-md" onclick="loadPipelines()">重试</button>'
                + '</div>';
        })
        .finally(function() {
            if (btn) {
                btn.disabled = false;
                btn.style.opacity = "";
            }
        });
}

function renderPipelines(data) {
    var container = document.getElementById("pipeline-list-container");
    var pipelines = data.pipelines || data.items || [];

    var timeEl = document.getElementById("refresh-time");
    if (timeEl) {
        timeEl.textContent = "更新于 " + new Date().toLocaleTimeString("zh-CN");
    }

    // 统计仪表盘：始终使用全量统计（不受过滤/分页影响）
    var stats = data.all_stats || {};
    var statEl;
    if (statEl = document.getElementById("stat-total")) statEl.textContent = stats.total != null ? stats.total : pipelines.length;
    if (statEl = document.getElementById("stat-running")) statEl.textContent = stats.running != null ? stats.running : 0;
    if (statEl = document.getElementById("stat-done")) statEl.textContent = stats.done != null ? stats.done : 0;
    if (statEl = document.getElementById("stat-other")) statEl.textContent = stats.other != null ? stats.other : 0;

    if (pipelines.length === 0) {
        var hasFilter = _keyword || _statusFilter;
        if (hasFilter) {
            container.innerHTML =
                '<div class="empty-state">'
                + '<div class="empty-icon">'
                +   '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>'
                + '</div>'
                + '<div class="empty-title">没有匹配的任务</div>'
                + '<div class="empty-desc">试试调整搜索关键词或状态筛选</div>'
                + '<button class="btn btn-secondary" onclick="clearFilters()">清除筛选</button>'
                + '</div>';
        } else {
            container.innerHTML =
                '<div class="empty-state">'
                + '<div class="empty-icon">'
                +   '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>'
                + '</div>'
                + '<div class="empty-title">暂无 Pipeline 记录</div>'
                + '<div class="empty-desc">启动一个 Pipeline 后，记录将显示在这里</div>'
                + '<a href="/" class="btn btn-primary btn-lg">启动新 Pipeline</a>'
                + '</div>';
        }
        return;
    }

    var html = '<div class="pipeline-list">';
    pipelines.forEach(function(p) {
        var statusBadge = "";
        var statusClass = "";
        switch (p.status) {
            case "running":
            case "pending":
                statusBadge = '<span class="badge badge-info">运行中</span>';
                statusClass = "running";
                break;
            case "done":
                statusBadge = '<span class="badge badge-success">已完成</span>';
                break;
            case "paused":
                statusBadge = '<span class="badge badge-warning">等待中</span>';
                break;
            case "error":
                statusBadge = '<span class="badge badge-danger">错误</span>';
                break;
            case "cancelled":
                statusBadge = '<span class="badge badge-neutral">已取消</span>';
                break;
            default:
                statusBadge = '<span class="badge badge-neutral">' + escapeHtml(p.status) + "</span>";
        }

        var href = "/pipeline/" + p.pipeline_id;
        if (p.status === "done") {
            href = "/results/" + p.pipeline_id;
        }

        // 进度条
        var pct = p.total_steps > 0 ? Math.round((p.completed_steps / p.total_steps) * 100) : 0;
        var barClass = p.status === "done" ? "success" : (p.status === "error" || p.status === "cancelled" ? "error" : "");

        html += '<a href="' + href + '" class="pipeline-item">'
            + '<div class="pipeline-item-left">'
            +     '<span class="pipeline-id">' + escapeHtml(p.pipeline_id) + "</span>"
            +     '<span class="pipeline-file">' + escapeHtml(p.requirements || "未知文件") + "</span>"
            + "</div>"
            + statusBadge
            + '<div class="pipeline-item-right">'
            +     '<div class="pipeline-progress">'
            +         '<span class="pipeline-progress-text">' + p.completed_steps + "/" + p.total_steps + " 步</span>"
            +         '<div class="progress-bar" style="width:100px;">'
            +             '<div class="progress-bar-fill ' + barClass + '" style="width:' + pct + '%;"></div>'
            +         "</div>"
            +     "</div>"
            +     '<span class="pipeline-time">' + relativeTime(p.started_at) + "</span>"
            + "</div>"
            + "</a>";
    });
    html += "</div>";
    container.innerHTML = html;
}

function renderPagination(data) {
    var container = document.getElementById("pagination-container");
    var pages = data.pages || 0;
    var page = data.page || 1;
    var total = data.total || 0;
    var page_size = data.page_size || _pageSize;

    if (pages <= 1) {
        container.style.display = "none";
        return;
    }

    container.style.display = "flex";

    var html = "";
    // 上一页
    html += '<button class="page-btn' + (page <= 1 ? " disabled" : "") + '"'
         + (page <= 1 ? " disabled" : ' onclick="goToPage(' + (page - 1) + ')"')
         + ' aria-label="上一页">&laquo;</button>';

    // 页码：显示最多 7 个页码，当前页居中
    var startP = Math.max(1, page - 3);
    var endP = Math.min(pages, startP + 6);
    startP = Math.max(1, endP - 6);

    if (startP > 1) {
        html += '<button class="page-btn" onclick="goToPage(1)">1</button>';
        if (startP > 2) html += '<span class="page-ellipsis">…</span>';
    }
    for (var i = startP; i <= endP; i++) {
        html += '<button class="page-btn' + (i === page ? " active" : "") + '"'
             + (i === page ? " disabled" : ' onclick="goToPage(' + i + ')"')
             + ">" + i + "</button>";
    }
    if (endP < pages) {
        if (endP < pages - 1) html += '<span class="page-ellipsis">…</span>';
        html += '<button class="page-btn" onclick="goToPage(' + pages + ')">' + pages + "</button>";
    }

    // 下一页
    html += '<button class="page-btn' + (page >= pages ? " disabled" : "") + '"'
         + (page >= pages ? " disabled" : ' onclick="goToPage(' + (page + 1) + ')"')
         + ' aria-label="下一页">&raquo;</button>';

    // 信息
    var rangeStart = (page - 1) * page_size + 1;
    var rangeEnd = Math.min(page * page_size, total);
    html += '<span class="pagination-info">' + rangeStart + "-" + rangeEnd + " / 共 " + total + " 条</span>";

    container.innerHTML = html;
}

function goToPage(p) {
    _currentPage = p;
    loadPipelines();
    // 滚回顶部
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function clearFilters() {
    _keyword = "";
    _statusFilter = "";
    _currentPage = 1;
    var si = document.getElementById("search-input");
    if (si) si.value = "";
    var sf = document.getElementById("status-filter");
    if (sf) sf.value = "";
    loadPipelines();
}

function updateURL() {
    var params = new URLSearchParams();
    if (_currentPage > 1) params.set("page", _currentPage);
    if (_keyword) params.set("keyword", _keyword);
    if (_statusFilter) params.set("status", _statusFilter);
    var qs = params.toString();
    var newURL = qs ? "?" + qs : window.location.pathname;
    window.history.replaceState(null, "", newURL);
}

// 首次加载
loadPipelines();
</script>

{% endblock %}
