<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI 测试用例生成系统 — 从需求到测试报告的全流程自动化">
    <meta name="theme-color" content="#2D2D30">
    <title>{{ title | default("AI TestGen") }}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234F46E5'/><text y='62' x='50' font-size='56' font-weight='800' text-anchor='middle' fill='white' font-family='Arial'>T</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"></noscript>
    <link rel="stylesheet" href="{{ "custom.css" | static_v }}" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="{{ "custom.css" | static_v }}"></noscript>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGxKv0Uq6YIA0XqKfM9GpgK9Gk2GztGqG+L9qYq8PkOGJ9G7E9HzLM5LZqG1y" crossorigin="anonymous"></script>
</head>
<body>
    <a href="#main-content" class="sr-only" style="position:absolute;top:0;left:0;z-index:9999;padding:8px 16px;background:var(--primary);color:var(--text-inverse);border-radius:0 0 var(--radius-sm) 0;">
        跳转到主内容
    </a>

    <nav class="app-nav" role="navigation" aria-label="主导航">
        <div class="app-nav-inner">
            <a href="/" class="app-nav-brand" aria-label="AI TestGen — 首页">
                <div class="brand-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <span>AI TestGen</span>
            </a>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="nav-hamburger" aria-label="菜单" onclick="document.querySelector('.app-nav-links').classList.toggle('open')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <ul class="app-nav-links" role="menubar">
                    <li role="none">
                        <a href="/" role="menuitem" {% block nav_home_active %}{% endblock %}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            <span>首页</span>
                        </a>
                    </li>
                    <li role="none">
                        <a href="/pipelines" role="menuitem" {% block nav_pipelines_active %}{% endblock %}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                            <span>任务</span>
                        </a>
                    </li>
                    <li role="none">
                        <a href="/knowledge" role="menuitem" {% block nav_kb_active %}{% endblock %}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                            <span>知识库</span>
                        </a>
                    </li>
                </ul>
                <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色主题" aria-label="切换深色/浅色主题">
                    <span id="theme-icon" aria-hidden="true">🌙</span>
                </button>
                <span id="user-info" style="display:none; align-items:center; gap:8px; font-size:0.85rem; color:var(--text-secondary);">
                    <span id="user-name"></span>
                    <button class="btn btn-secondary btn-sm" onclick="doLogout()" title="登出" aria-label="登出">登出</button>
                </span>
            </div>
        </div>
    </nav>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-relevant="additions"></div>

    <main class="app-main" role="main" id="main-content" tabindex="-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer" role="contentinfo">
        <span>AI TestGen v2.0.0</span>
        <span aria-hidden="true"> · </span>
        <a href="/docs" target="_blank" rel="noopener noreferrer">API 文档</a>
        <span aria-hidden="true"> · </span>
        <a href="/health">健康检查</a>
    </footer>

    <script src="{{ "app.js" | static_v }}"></script>
    <script>
    // Nav scroll shadow effect
    (function() {
        var nav = document.querySelector('.app-nav');
        if (nav) {
            var handler = function() {
                if (window.scrollY > 8) nav.classList.add('scrolled');
                else nav.classList.remove('scrolled');
            };
            window.addEventListener('scroll', handler, { passive: true });
            handler();
        }
    })();

    // 加载用户信息
    (function() {
        var token = localStorage.getItem('access_token');
        if (!token) return;
        var userInfo = document.getElementById('user-info');
        var userName = document.getElementById('user-name');
        fetch('/api/auth/me', {
            headers: {'Authorization': 'Bearer ' + token}
        })
        .then(function(r) {
            if (r.status === 401) {
                // Token 过期 — 清除并跳转登录页
                localStorage.removeItem('access_token');
                localStorage.removeItem('username');
                localStorage.removeItem('role');
                // 静默跳转，不打断当前操作
                if (window.location.pathname !== '/login') {
                    window.location.href = '/login?reason=expired';
                }
                return null;
            }
            if (r.status >= 500) {
                console.warn('服务器异常，认证状态检查失败');
                return null;
            }
            return r.json();
        })
        .then(function(data) {
            if (data && data.username) {
                userInfo.style.display = 'flex';
                userName.textContent = data.username;
            }
        })
        .catch(function() {
            // 网络错误 — 静默处理
            console.warn('网络连接异常，认证状态检查失败');
        });
    })();

    function doLogout() {
        fetch('/api/auth/logout', { method: 'POST' })
            .then(function() {
                localStorage.removeItem('access_token');
                localStorage.removeItem('username');
                localStorage.removeItem('role');
                window.location.href = '/login';
            })
            .catch(function() {
                localStorage.removeItem('access_token');
                window.location.href = '/login';
            });
    }

    // 操作确认弹窗工具函数
    function confirmAction(message, callback) {
        if (window.confirm(message)) {
            callback();
        }
    }

    // CSRF Token 自动注入 HTMX 请求
    (function() {
        function getCookie(name) {
            var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? match[2] : '';
        }
        document.body.addEventListener('htmx:configRequest', function(evt) {
            var token = getCookie('csrf_token');
            if (token) {
                evt.detail.headers['X-CSRF-Token'] = token;
            }
        });
    })();

    document.addEventListener('DOMContentLoaded', function() {
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                var searchInput = document.getElementById('search-q');
                if (searchInput) {
                    e.preventDefault();
                    searchInput.focus();
                }
            }
            if (e.key === 'Escape') {
                var overlay = document.querySelector('.modal-overlay');
                if (overlay) overlay.remove();
            }
        });
    });

    // ─── U-02: 页面切换进度条 + 全局加载遮罩 ───
    (function() {
        // 创建进度条元素
        var progressBar = document.createElement('div');
        progressBar.className = 'page-progress-bar';
        progressBar.id = 'page-progress';
        document.body.appendChild(progressBar);

        // 创建全局加载遮罩
        var overlay = document.createElement('div');
        overlay.className = 'global-loading-overlay';
        overlay.id = 'global-loading';
        overlay.innerHTML = '<div class="spinner"></div>';
        document.body.appendChild(overlay);

        // HTMX 请求开始时显示进度条
        document.body.addEventListener('htmx:beforeRequest', function() {
            progressBar.style.width = '0%';
            progressBar.style.opacity = '1';
            progressBar.classList.remove('complete');
            requestAnimationFrame(function() {
                progressBar.style.width = '70%';
            });
        });

        // HTMX 请求完成时隐藏进度条
        document.body.addEventListener('htmx:afterRequest', function() {
            progressBar.style.width = '100%';
            setTimeout(function() {
                progressBar.classList.add('complete');
            }, 100);
        });

        // 文件上传进度
        document.body.addEventListener('htmx:xhr:progress', function(evt) {
            if (evt.detail.lengthComputable) {
                var pct = (evt.detail.loaded / evt.detail.total) * 100;
                var bar = document.querySelector('.upload-progress-bar');
                if (bar) bar.style.width = pct + '%';
            }
        });
    })();
    </script>
</body>
</html>
