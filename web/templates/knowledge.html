{% extends "base.html" %}
{% block nav_kb_active %}class="active"{% endblock %}
{% block content %}

<div class="page-header">
    <h2>知识库管理</h2>
</div>

<!-- 双栏布局：主栏（搜索+结果）/ 侧栏（添加+导入） -->
<div class="kb-layout">

    <!-- ========== 主栏：搜索 + 结果 ========== -->
    <div class="kb-main">

        <!-- 紧凑统计条 -->
        <div id="kb-status"
             hx-get="/api/kb/status"
             hx-trigger="load"
             hx-target="this"
             hx-swap="innerHTML"
             aria-live="polite">
            <div class="kb-stat-bar">
                <div class="skeleton" style="width:120px; height:32px; border-radius:8px;"></div>
                <div class="skeleton" style="width:120px; height:32px; border-radius:8px;"></div>
            </div>
        </div>

        <!-- 搜索区 -->
        <div class="kb-search-section">
            <div class="kb-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                搜索知识库
            </div>
            <form id="kb-search-form"
                  hx-get="/api/kb/search"
                  hx-target="#search-results"
                  hx-swap="innerHTML"
                  aria-label="搜索知识库">
                <div class="search-box">
                    <span class="search-icon" aria-hidden="true">⌕</span>
                    <input type="search" id="search-q" name="q" class="form-input"
                           placeholder="输入关键词搜索知识库..."
                           autocomplete="off"
                           aria-label="搜索关键词">
                </div>
                <button type="submit" class="btn btn-primary">搜索</button>
            </form>
            <div class="kb-search-hint"><kbd>Ctrl</kbd>+<kbd>K</kbd> 快捷搜索</div>
        </div>

        <!-- 结果区：独占主栏剩余空间 -->
        <div class="search-results" id="search-results" aria-live="polite">
            <div class="empty-state" style="padding:56px 24px;">
                <div class="empty-icon">⌕</div>
                <div class="empty-title">搜索知识库</div>
                <div class="empty-desc">输入关键词后点击搜索，查找相关知识条目</div>
            </div>
        </div>
    </div>

    <!-- ========== 侧栏：添加 + 导入 ========== -->
    <aside class="kb-sidebar">

        <!-- 添加知识条目 -->
        <div class="kb-side-card">
            <div class="kb-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16m8-8H4"/></svg>
                添加知识条目
            </div>
            <form id="kb-add-form" aria-label="添加单条知识条目">
                <div class="form-group">
                    <label class="form-label" for="kb-add-title">标题</label>
                    <input type="text" id="kb-add-title" name="title" class="form-input" required placeholder="知识条目标题">
                </div>
                <div class="form-group">
                    <label class="form-label" for="kb-add-category">分类</label>
                    <select id="kb-add-category" name="category" class="form-select" required>
                        <option value="">请选择分类</option>
                        <option value="business-rules">业务规则</option>
                        <option value="historical-cases">历史用例</option>
                        <option value="pitfalls">常见坑点</option>
                        <option value="templates">用例模板</option>
                        <option value="data-dictionary">数据字典</option>
                        <option value="business-specs">业务规范</option>
                        <option value="team-standards">团队标准</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="kb-add-content">内容</label>
                    <textarea id="kb-add-content" name="content" class="form-textarea" rows="4" required placeholder="知识条目内容..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="kb-add-tags">标签 (可选)</label>
                    <input type="text" id="kb-add-tags" name="tags" class="form-input" placeholder="逗号分隔，如: 登录,鉴权">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="kb-add-btn">添加</button>
            </form>
            <div id="kb-add-result" class="mt-md" style="display:none;"></div>
        </div>

        <!-- 导入用例 -->
        <div class="kb-side-card">
            <div class="kb-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                导入用例
            </div>
            <p class="kb-side-desc">从 Excel 文件导入测试用例，自动识别标准格式回灌知识库</p>
            <form id="kb-import-form" enctype="multipart/form-data" aria-label="导入 Excel 用例回灌知识库">
                <div class="file-upload-zone" id="kb-import-zone">
                    <div class="upload-icon" id="kb-import-icon" aria-hidden="true">↑</div>
                    <div class="upload-text" id="kb-import-text">选择 Excel 文件 (.xlsx)</div>
                    <div class="file-name" id="kb-import-filename" style="display:none;"></div>
                    <input type="file" id="kb-import-file" name="file" accept=".xlsx,.xls"
                           aria-label="选择 Excel 文件导入">
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-md" id="kb-import-btn">导入</button>
            </form>
            <div id="kb-import-result" class="mt-md" style="display:none;"></div>
        </div>

    </aside>

</div>

<script>
// 知识库状态渲染（紧凑统计条）
document.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'kb-status') {
        try {
            var rawText = evt.detail.xhr.responseText;
            var data = JSON.parse(rawText);

            if (data.error) {
                evt.detail.target.innerHTML =
                    '<div class="kb-stat-error">' +
                    '<span>⚠️ 知识库加载异常</span>' +
                    '<button class="btn btn-secondary btn-sm" onclick="htmx.trigger(document.getElementById(\'kb-status\'), \'load\')">重试</button>' +
                    '</div>';
                return;
            }

            if (data.enabled === false && !data.total && !data.categories) {
                evt.detail.target.innerHTML =
                    '<div class="kb-stat-empty">📚 知识库未启用 · 请在配置中开启</div>';
                return;
            }

            var categories = data.categories || {};
            var chips = '';
            Object.keys(categories).forEach(function(cat) {
                chips += '<span class="kb-stat-chip"><strong>' + categories[cat] + '</strong> ' + escapeHtml(cat) + '</span>';
            });

            evt.detail.target.innerHTML =
                '<div class="kb-stat-bar">' +
                '<span class="kb-stat-total"><strong>' + (data.total || 0) + '</strong> 总条目</span>' +
                chips +
                '</div>';
        } catch(e) {}
    }

    // 搜索结果渲染
    if (evt.detail.target.id === 'search-results') {
        try {
            var rawText = evt.detail.xhr.responseText;
            var data = JSON.parse(rawText);

            if (data.error) {
                evt.detail.target.innerHTML =
                    '<div class="search-error">❌ 搜索失败：' + escapeHtml(data.error) + '</div>';
                return;
            }

            if (!data.results || data.results.length === 0) {
                evt.detail.target.innerHTML =
                    '<div class="empty-state" style="padding:56px 24px;">' +
                    '<div class="empty-icon">—</div>' +
                    '<div class="empty-title">未找到相关结果</div>' +
                    '<div class="empty-desc">尝试使用不同的关键词</div></div>';
                return;
            }

            var html = '<div class="kb-result-header">找到 <strong>' + data.total + '</strong> 条结果</div>';
            data.results.forEach(function(r) {
                html += '<div class="search-result-item">' +
                       '<div class="result-title">' + escapeHtml(r.title || '无标题') + '</div>' +
                       '<div class="result-category">' + escapeHtml(r.category || '') + (r.module ? ' · ' + escapeHtml(r.module) : '') + '</div>' +
                       '<div class="result-preview">' + escapeHtml(r.preview) + '</div>' +
                       '</div>';
            });
            evt.detail.target.innerHTML = html;
        } catch(e) { console.error('知识库搜索结果渲染失败:', e); }
    }
});

// 回车搜索
document.getElementById('search-q').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        var q = this.value.trim();
        if (!q) { showToast('请输入搜索关键词', 'warning'); return; }
        htmx.trigger(document.getElementById('kb-search-form'), 'submit');
    }
});

// 初始化导入上传区（延迟到 app.js 加载完成后执行）
function _initKbUploadZone() {
    if (typeof initUploadZone === 'function') {
        initUploadZone('kb-import-zone', 'input[type="file"]', 'kb-import-filename', 'kb-import-icon', 'kb-import-text');
    } else {
        requestAnimationFrame(_initKbUploadZone);
    }
}
_initKbUploadZone();

// 添加知识条目
document.getElementById('kb-add-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('kb-add-btn');
    var resultEl = document.getElementById('kb-add-result');
    var formData = new FormData(this);

    btn.disabled = true;
    btn.textContent = '添加中...';
    resultEl.style.display = 'none';

    authFetch('/api/kb/add', { method: 'POST', body: formData })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            resultEl.style.display = 'block';
            if (data.ok) {
                resultEl.innerHTML = '<div class="kb-feedback-success">✓ 添加成功</div>';
                showToast('知识条目添加成功', 'success');
                htmx.trigger(document.getElementById('kb-status'), 'load');
                document.getElementById('kb-add-form').reset();
            } else {
                resultEl.innerHTML = '<div class="kb-feedback-error">添加失败：' + escapeHtml(data.message) + '</div>';
                showToast('添加失败', 'error');
            }
        })
        .catch(function(err) {
            resultEl.style.display = 'block';
            resultEl.innerHTML = '<div class="kb-feedback-error">请求失败：' + escapeHtml(err.message) + '</div>';
            showToast('请求失败', 'error');
        })
        .finally(function() {
            btn.disabled = false;
            btn.textContent = '添加';
        });
});

// 导入用例
document.getElementById('kb-import-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var fileInput = document.getElementById('kb-import-file');
    var btn = document.getElementById('kb-import-btn');
    var resultEl = document.getElementById('kb-import-result');

    if (!fileInput.files || !fileInput.files.length) {
        showToast('请选择 Excel 文件', 'warning');
        return;
    }

    btn.disabled = true;
    btn.textContent = '导入中...';
    resultEl.style.display = 'none';

    var formData = new FormData();
    formData.append('file', fileInput.files[0]);

    authFetch('/api/kb/import', { method: 'POST', body: formData })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            resultEl.style.display = 'block';
            if (data.ok) {
                resultEl.innerHTML = '<div class="kb-feedback-success">✓ 导入成功 · 已导入 ' + data.imported + ' 条</div>';
                showToast('导入成功: ' + data.imported + ' 条', 'success');
                htmx.trigger(document.getElementById('kb-status'), 'load');
            } else {
                resultEl.innerHTML = '<div class="kb-feedback-error">导入失败：' + escapeHtml(data.message) + '</div>';
                showToast('导入失败', 'error');
            }
        })
        .catch(function(err) {
            resultEl.style.display = 'block';
            resultEl.innerHTML = '<div class="kb-feedback-error">请求失败：' + escapeHtml(err.message) + '</div>';
            showToast('请求失败', 'error');
        })
        .finally(function() {
            btn.disabled = false;
            btn.textContent = '导入';
        });
});
</script>

{% endblock %}
