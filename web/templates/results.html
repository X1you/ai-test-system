{% extends "base.html" %}
{% block nav_home_active %}class="active"{% endblock %}
{% block content %}

<div class="page-header">
    <h2>结果预览 — #{{ pipeline_id }}</h2>
    <div class="flex items-center gap-md">
        <a href="/pipeline/{{ pipeline_id }}" class="btn btn-secondary btn-sm">进度详情</a>
        <a href="/pipelines" class="back-link">← 任务列表</a>
    </div>
</div>

<!-- 步骤摘要 -->
<div id="step-summary"
     hx-get="/api/pipeline/{{ pipeline_id }}/status"
     hx-trigger="load"
     hx-target="this"
     hx-swap="innerHTML">
    <div class="step-summary-grid">
        <div class="skeleton" style="height:60px;"></div>
        <div class="skeleton" style="height:60px;"></div>
        <div class="skeleton" style="height:60px;"></div>
        <div class="skeleton" style="height:60px;"></div>
    </div>
</div>

<hr style="border:none; border-top:1px solid var(--border-subtle); margin:28px 0;">

<!-- 产物列表 — 由 status 区成功后触发加载，避免 pipeline 不存在时重复 404 -->
<div class="form-group" id="artifacts-section" style="display:none;">
    <label class="form-label">产物文件</label>
    <div id="artifacts-area"
         hx-get="/api/pipeline/{{ pipeline_id }}/artifacts"
         hx-trigger="none"
         hx-target="this"
         hx-swap="innerHTML">
        <div class="flex gap-md" style="flex-wrap:wrap;">
            <div class="skeleton" style="width:180px; height:120px;"></div>
            <div class="skeleton" style="width:180px; height:120px;"></div>
            <div class="skeleton" style="width:180px; height:120px;"></div>
        </div>
    </div>
</div>

<!-- 预览区域 -->
<div class="form-group">
    <label class="form-label">文件预览</label>
    <div class="preview-area" id="preview-area" aria-live="polite" aria-label="文件预览">
        <div class="empty-state">
        <div class="empty-icon">—</div>
        <div class="empty-title">选择上方文件预览</div>
        <div class="empty-desc">点击产物卡片即可预览内容</div>
        </div>
    </div>
</div>

<script>
// 产物数据缓存
var currentArtifacts = [];
var currentPipelineId = '{{ pipeline_id }}';

// 渲染步骤摘要
function renderStepSummary(data) {
    var container = document.getElementById('step-summary');
    var steps = data.steps || [];
    if (steps.length === 0) {
        container.innerHTML = '';
        return;
    }
    var html = '<div class="step-summary-grid">';
    steps.forEach(function(s) {
        var statusIcon = '○';
        var statusClass = '';
        if (s.status === 'done') { statusIcon = '✓'; statusClass = 'text-success'; }
        else if (s.status === 'running') { statusIcon = '⟳'; statusClass = 'text-primary'; }
        else if (s.status === 'error') { statusIcon = '✕'; statusClass = 'text-danger'; }

        html += '<div class="step-summary-card">' +
            '<div class="step-num">Step ' + s.id + '</div>' +
            '<div class="step-title">' +
            '<span class="' + statusClass + '" aria-hidden="true">' + statusIcon + '</span> ' +
            escapeHtml(s.name) +
            '</div>' +
            (s.detail ? '<div class="step-detail">' + escapeHtml(s.detail) + '</div>' : '') +
            '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
}

// 渲染产物列表
function renderArtifacts(data) {
    currentArtifacts = data.artifacts || [];
    var html = '';
    if (currentArtifacts.length === 0) {
        html = '<div class="empty-state"><div class="empty-icon">📭</div>' +
               '<div class="empty-title">暂无产物</div>' +
               '<div class="empty-desc">Pipeline 产物将在执行完成后出现</div></div>';
    } else {
        html = '<div class="artifact-grid">';
        currentArtifacts.forEach(function(a, i) {
            var icon = '·';
            if (a.type === 'excel') icon = '≡';
            else if (a.type === 'xmind') icon = '◇';
            else if (a.name.indexOf('test_report') >= 0) icon = '¶';
            else if (a.name.indexOf('review') >= 0) icon = '◎';
            else if (a.name.indexOf('analysis') >= 0) icon = '§';
            else if (a.name.indexOf('testpoints') >= 0) icon = '¶';
            else if (a.name.indexOf('clarification') >= 0) icon = '?';

            html += '<div class="artifact-card" onclick="previewFile(\'' + data.pipeline_id + '\', \'' + a.name + '\', this)" ' +
                    'tabindex="0" role="button" aria-label="预览 ' + escapeHtml(a.display_name) + '"' +
                    'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click();}">' +
                    '<div class="artifact-icon" aria-hidden="true">' + icon + '</div>' +
                    '<div class="artifact-name">' + escapeHtml(a.display_name) + '</div>' +
                    '<div class="artifact-size">' + formatFileSize(a.size) + '</div>' +
                    '</div>';
        });
        html += '</div>';

        // 下载按钮
        html += '<div class="action-bar mt-md">';
        currentArtifacts.forEach(function(a) {
            html += '<a href="/api/pipeline/' + data.pipeline_id + '/artifacts/' + a.name +
                    '" class="btn btn-secondary btn-sm" download aria-label="下载 ' + escapeHtml(a.display_name) + '">下载 ' + escapeHtml(a.display_name) + '</a>';
        });
        html += '</div>';
    }
    document.getElementById('artifacts-area').innerHTML = html;
}

// 文件预览（带平滑过渡）
function previewFile(pipelineId, fileName, cardEl) {
    // 高亮选中卡片
    document.querySelectorAll('.artifact-card').forEach(function(c) { c.classList.remove('active'); });
    if (cardEl) cardEl.classList.add('active');

    var area = document.getElementById('preview-area');
    if (!area) return;

    // 先淡出旧内容
    area.classList.remove('content-enter');
    area.style.opacity = '0';

    // 显示加载状态
    area.innerHTML = '<div class="text-center" style="padding:40px;"><div class="spinner spinner-lg"></div><p class="text-muted mt-md">加载预览...</p></div>';
    area.style.opacity = '1';

    fetch('/api/pipeline/' + pipelineId + '/preview/' + fileName)
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function(data) {
            if (data.type === 'markdown') {
                area.innerHTML = '<div class="card"><div style="line-height:1.8;">' + data.html + '</div></div>';
            } else if (data.type === 'excel') {
                var html = '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>';
                if (data.rows.length > 0) {
                    data.rows[0].forEach(function(cell) { html += '<th>' + escapeHtml(cell) + '</th>'; });
                }
                html += '</tr></thead><tbody>';
                data.rows.slice(1).forEach(function(row) {
                    html += '<tr>';
                    row.forEach(function(cell) { html += '<td>' + escapeHtml(cell) + '</td>'; });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                if (data.rows.length >= 50) {
                    html += '<p class="text-center text-muted text-sm mt-md">仅显示前 50 行</p>';
                }
                area.innerHTML = html;
            } else {
                area.innerHTML = '<div class="card"><p class="text-muted">不支持预览此格式</p></div>';
            }
            // 新内容淡入
            requestAnimationFrame(function() {
                area.classList.add('content-enter');
            });
        })
        .catch(function(err) {
            area.innerHTML = '<div class="card" style="background:var(--danger-light); border-color:var(--danger);">' +
                           '<strong>❌ 预览失败</strong><p class="text-sm text-muted mt-sm">' + escapeHtml(err.message) + '</p></div>';
            requestAnimationFrame(function() {
                area.classList.add('content-enter');
            });
        });
}

// HTMX 渲染产物
document.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'artifacts-area') {
        try {
            var rawText = evt.detail.xhr.responseText;
            var data = JSON.parse(rawText);
            renderArtifacts(data);
        } catch(e) {
            document.getElementById('artifacts-area').innerHTML =
                '<div class="empty-state"><div class="empty-icon">⚠️</div>' +
                '<div class="empty-title">加载失败</div>' +
                '<button class="btn btn-secondary btn-sm mt-md" onclick="htmx.trigger(document.getElementById(\'artifacts-area\'), \'load\')">🔄 重试</button>' +
                '</div>';
        }
    }

    if (evt.detail.target.id === 'step-summary') {
        try {
            var rawText = evt.detail.xhr.responseText;
            var data = JSON.parse(rawText);
            renderStepSummary(data);
            // ★ status 成功加载，显示并触发 artifacts 加载
            var artifactsSection = document.getElementById('artifacts-section');
            var artifactsArea = document.getElementById('artifacts-area');
            if (artifactsSection && artifactsArea) {
                artifactsSection.style.display = '';
                artifactsArea.setAttribute('hx-trigger', 'load');
                if (typeof htmx !== 'undefined') {
                    htmx.process(artifactsArea);
                    htmx.trigger(artifactsArea, 'load');
                }
            }
        } catch(e) {}
    }
});

// ★ 结果页 404 处理：status 区 404 时，artifacts 不会加载（hx-trigger="none"，
//   只有 status 成功后才触发），所以不会出现重复错误面板。
</script>

{% endblock %}
