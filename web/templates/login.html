<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — AI TestGen</title>
    <meta name="theme-color" content="#2D2D30">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234F46E5'/><text y='62' x='50' font-size='56' font-weight='800' text-anchor='middle' fill='white' font-family='Arial'>T</text></svg>">
    <link rel="stylesheet" href="{{ "custom.css" | static_v }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-root);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.014em;
        }

        /* Ambient background mesh */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 80% 60% at 20% -10%, rgba(99, 102, 241, 0.10), transparent),
                radial-gradient(ellipse 60% 50% at 90% 90%, rgba(16, 185, 129, 0.06), transparent),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(168, 85, 247, 0.04), transparent);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        [data-theme="dark"] body::before {
            background:
                radial-gradient(ellipse 80% 60% at 20% -10%, rgba(255, 255, 255, 0.04), transparent),
                radial-gradient(ellipse 60% 50% at 90% 90%, rgba(255, 255, 255, 0.02), transparent),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255, 255, 255, 0.015), transparent);
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 920px;
            min-height: 540px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-2xl);
            overflow: hidden;
            animation: login-enter 0.6s var(--ease-out);
            margin: 24px;
        }

        @keyframes login-enter {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-panel {
            flex: 1;
            padding: 52px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 8px;
        }

        .login-brand .brand-mark {
            width: 38px;
            height: 38px;
            background: var(--gradient-brand);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-inverse);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.35),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .login-brand .brand-mark svg {
            width: 20px;
            height: 20px;
        }

        .login-brand h1 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            margin-bottom: 36px;
        }

        .login-form-group {
            margin-bottom: 18px;
        }

        .login-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: -0.014em;
        }

        .login-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg-surface);
            transition: all 0.15s var(--ease-out);
            outline: none;
            letter-spacing: -0.014em;
        }

        .login-input::placeholder {
            color: var(--text-tertiary);
        }

        .login-input:hover {
            border-color: var(--border-strong);
        }

        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .btn-login {
            width: 100%;
            padding: 13px 24px;
            background: var(--primary);
            color: var(--text-inverse);
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s var(--ease-out);
            letter-spacing: -0.014em;
            box-shadow: 0 1px 3px rgba(99, 102, 241, 0.25), 0 1px 2px rgba(99, 102, 241, 0.12);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s var(--ease-out);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3), 0 2px 6px rgba(99, 102, 241, 0.15);
            transform: translateY(-1px);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: scale(0.97);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: var(--danger-light);
            color: var(--danger);
            padding: 11px 14px;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.78rem;
            color: var(--text-tertiary);
        }

        .spinner-inline {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(128,128,128,0.3);
            border-top-color: var(--text-inverse);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Hero side ── */
        .login-hero {
            flex: 1;
            background: linear-gradient(160deg, var(--brand-600) 0%, var(--brand-800) 60%, var(--brand-950) 100%);
            padding: 52px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: var(--text-inverse);
            position: relative;
            overflow: hidden;
        }

        /* Animated grid pattern */
        .login-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, #000 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, #000 30%, transparent 75%);
            pointer-events: none;
        }

        /* Glow orbs */
        .login-hero::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.35), transparent 70%);
            pointer-events: none;
            animation: orb-float 8s ease-in-out infinite;
        }

        /* ── Dark mono mode hero override ── */
        [data-theme="dark"] .login-hero {
            background: linear-gradient(160deg, hsl(220, 3%, 17%) 0%, hsl(220, 3%, 10%) 60%, hsl(220, 3%, 4%) 100%);
        }

        [data-theme="dark"] .login-hero::after {
            background: radial-gradient(circle, hsla(220, 3%, 100%, 0.08), transparent 70%);
        }

        [data-theme="dark"] .login-hero .feature-icon svg {
            color: hsl(220, 3%, 80%);
        }

        [data-theme="dark"] .login-hero .hero-badge .badge-dot {
            background: hsl(220, 3%, 80%);
            box-shadow: 0 0 8px hsla(220, 3%, 100%, 0.3);
        }

        @keyframes orb-float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, 20px); }
        }

        .login-hero > * { position: relative; z-index: 1; }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            width: fit-content;
        }

        .hero-badge .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-400);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
        }

        .login-hero h2 {
            font-size: 1.625rem;
            font-weight: 800;
            letter-spacing: -0.035em;
            margin-bottom: 14px;
            line-height: 1.25;
        }

        .login-hero p {
            font-size: 0.9rem;
            opacity: 0.75;
            line-height: 1.65;
            margin-bottom: 28px;
        }

        .login-hero .feature-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .login-hero .feature-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.9;
        }

        .login-hero .feature-list li .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .login-hero .feature-list li .feature-icon svg {
            width: 16px;
            height: 16px;
            color: var(--accent-400);
        }

        /* Theme toggle */
        .theme-toggle-corner {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            padding: 6px 10px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1;
            transition: all 0.15s var(--ease-out);
            z-index: 10;
        }

        .theme-toggle-corner:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            border-color: var(--border-strong);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                max-width: 420px;
                margin: 16px;
                min-height: auto;
            }

            .login-hero {
                padding: 36px 28px;
            }

            .login-panel {
                padding: 36px 28px;
            }

            .login-hero h2 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle-corner" onclick="toggleTheme()" title="切换深色/浅色主题" aria-label="切换深色/浅色主题">
        <span id="theme-icon" aria-hidden="true">🌙</span>
    </button>

    <div class="login-container">
        <div class="login-panel">
            <div class="login-brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <h1>AI TestGen</h1>
            </div>
            <p class="login-subtitle">登录以继续使用 AI 测试用例生成系统</p>

            <div class="error-msg" id="error-msg"></div>

            <form id="login-form">
                <div class="login-form-group">
                    <label class="login-label" for="username">用户名</label>
                    <input type="text" id="username" name="username" class="login-input"
                           placeholder="输入用户名" required autofocus
                           autocomplete="username">
                </div>
                <div class="login-form-group">
                    <label class="login-label" for="password">密码</label>
                    <input type="password" id="password" name="password" class="login-input"
                           placeholder="输入密码" required
                           autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="login-btn">
                    <span id="btn-text">登 录</span>
                </button>
            </form>

            <div class="login-footer">AI TestGen v2.0.0</div>
        </div>

        <div class="login-hero">
            <div class="hero-badge">
                <span class="badge-dot"></span>
                AI-Powered QA Platform
            </div>
            <h2>从需求到测试报告<br>全流程自动化</h2>
            <p>基于 AI 驱动的测试用例生成系统，让测试工作更高效、更智能。</p>
            <ul class="feature-list">
                <li>
                    <span class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z"/></svg>
                    </span>
                    需求智能分析与要点提取
                </li>
                <li>
                    <span class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    </span>
                    多维度测试用例自动生成
                </li>
                <li>
                    <span class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </span>
                    用例质量评审与优化
                </li>
                <li>
                    <span class="feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </span>
                    Excel / XMind 多格式导出
                </li>
            </ul>
        </div>
    </div>

    <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('login-btn');
        var btnText = document.getElementById('btn-text');
        var errorMsg = document.getElementById('error-msg');

        btn.disabled = true;
        btnText.innerHTML = '<span class="spinner-inline"></span>登录中...';
        errorMsg.style.display = 'none';

        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;

        try {
            var resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, password: password}),
            });
            var data = await resp.json();

            if (resp.ok) {
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);
                window.location.href = '/';
            } else {
                errorMsg.textContent = data.detail || '登录失败';
                errorMsg.style.display = 'block';
            }
        } catch(err) {
            errorMsg.textContent = '网络错误，请重试';
            errorMsg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btnText.textContent = '登 录';
        }
    });

    /* Theme toggle — shared with app.js */
    (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        updateThemeColor(theme);
        var icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                var t = e.matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', t);
                updateThemeColor(t);
                if (icon) icon.textContent = e.matches ? '☀️' : '🌙';
            }
        });
    })();

    function updateThemeColor(theme) {
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = theme === 'dark' ? '#111113' : '#F8FAFC';
    }

    function toggleTheme() {
        var html = document.documentElement;
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeColor(next);
        var icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = next === 'dark' ? '☀️' : '🌙';
    }
    </script>
</body>
</html>
