{% extends "base.html" %}
{% block nav_home_active %}class="active"{% endblock %}
{% block content %}

<div class="page-header">
    <h2>Pipeline #{{ pipeline_id }}</h2>
    <div class="flex items-center gap-md">
        <button class="btn btn-outline-danger btn-sm" id="cancel-btn"
                onclick="cancelPipeline('{{ pipeline_id }}')"
                title="取消当前 Pipeline">
            取消
        </button>
        <a href="/" class="back-link">← 返回首页</a>
    </div>
</div>

<!-- 进度区 -->
<div id="progress-area"
     hx-get="/api/pipeline/{{ pipeline_id }}/progress"
     hx-trigger="every 2s"
     hx-swap="innerHTML"
     hx-target="this"
     hx-indicator="#progress-spinner"
     aria-live="polite"
     aria-label="Pipeline 执行进度">
    <div style="text-align:center; padding:40px 0;">
        <div class="spinner spinner-lg"></div>
        <p class="text-muted mt-md">正在加载进度...</p>
    </div>
</div>

<span class="htmx-indicator" id="progress-spinner">
    <div class="spinner" style="margin:8px auto;"></div>
</span>

<!-- 结果链接（完成后显示）-->
<div id="result-actions" style="display:none;">
    <div class="action-bar" style="justify-content:center; margin-top:24px;">
        <a href="/results/{{ pipeline_id }}" class="btn btn-primary btn-lg">
            查看结果
        </a>
        <a href="/" class="btn btn-secondary">
            返回首页
        </a>
    </div>
</div>

<script>
// 取消 Pipeline
var _cancelRequested = {}; // 防止重复点击
function cancelPipeline(pipelineId) {
    // 防重复提交
    if (_cancelRequested[pipelineId]) return;
    // 二次确认，防止误操作
    if (!window.confirm('确定要取消 Pipeline #' + pipelineId + ' 吗？\n该操作不可撤销。')) {
        return;
    }
    _cancelRequested[pipelineId] = true;
    var btn = document.getElementById('cancel-btn');
    if (btn) btn.disabled = true;

    fetch('/api/pipeline/' + pipelineId + '/cancel', { method: 'POST' })
        .then(function(r) {
            if (r.status === 404) {
                // 任务已不存在：当作已取消处理，不报错
                throw new Error('NOT_FOUND');
            }
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function(data) {
            showToast('Pipeline 已取消', 'warning');
            stopPolling('progress-area');
            _showCancelledUI('任务已手动终止');
        })
        .catch(function(err) {
            _cancelRequested[pipelineId] = false;
            if (err.message === 'NOT_FOUND') {
                // 任务不存在，直接展示"已取消/不存在"状态，停止轮询
                stopPolling('progress-area');
                _showCancelledUI('任务不存在或已被清理');
                showToast('任务不存在，可能已被清理', 'warning');
            } else {
                showToast('取消失败: ' + err.message, 'error');
                if (btn) btn.disabled = false;
            }
        });
}

// 统一的"已取消/不存在"状态 UI
function _showCancelledUI(subtitle) {
    var area = document.getElementById('progress-area');
    if (area) {
        area.innerHTML =
            '<div class="card" style="background:var(--warning-light); border-color:var(--warning); text-align:center; padding:32px;">' +
            '<div style="font-size:2rem; margin-bottom:12px; opacity:0.5;">⊘</div>' +
            '<strong>Pipeline 已取消</strong>' +
            '<p class="text-sm text-muted mt-sm">' + subtitle + '</p>' +
            '<div class="action-bar" style="justify-content:center; margin-top:16px;">' +
            '<a href="/" class="btn btn-primary">返回首页</a>' +
            '<a href="/pipelines" class="btn btn-secondary">任务列表</a>' +
            '</div></div>';
    }
    // 取消按钮已无意义，隐藏
    var cancelBtn = document.getElementById('cancel-btn');
    if (cancelBtn) cancelBtn.style.display = 'none';
}

// 监听 pipeline-complete 事件 → 停止轮询
document.body.addEventListener('pipeline-complete', function() {
    stopPolling('progress-area');
    var cancelBtn = document.getElementById('cancel-btn');
    if (cancelBtn) cancelBtn.style.display = 'none';
    setTimeout(function() {
        var resultActions = document.getElementById('result-actions');
        if (resultActions) resultActions.style.display = 'block';
        showToast('Pipeline 执行完成', 'success');
    }, 300);
});

// 监听 pipeline-paused 事件
document.body.addEventListener('pipeline-paused', function() {
    stopPolling('progress-area');
    var cancelBtn = document.getElementById('cancel-btn');
    if (cancelBtn) cancelBtn.style.display = 'none';
    showToast('Pipeline 已暂停，等待人工操作', 'warning');
});

// 监听 pipeline-error 事件
document.body.addEventListener('pipeline-error', function() {
    stopPolling('progress-area');
    var cancelBtn = document.getElementById('cancel-btn');
    if (cancelBtn) cancelBtn.style.display = 'none';
    showToast('Pipeline 执行出错', 'error');
});

// 监听 pipeline-cancelled 事件
document.body.addEventListener('pipeline-cancelled', function() {
    stopPolling('progress-area');
    var cancelBtn = document.getElementById('cancel-btn');
    if (cancelBtn) cancelBtn.style.display = 'none';
});
</script>

{% endblock %}
